version: "3.9"

services:
  rowan:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: rowan_app
    volumes:
      - ../vectordb:/app/vectordb_storage   # persistent vector DB
      - ../:/app                             # optional live code updates
    ports:
      - "8000:8000"
    env_file:
      - ../.env