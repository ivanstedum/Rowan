version: '3.9'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: rowan_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama/models
    networks:
      - rowan_network
    restart: unless-stopped
    environment:
      - OLLAMA_LLM_LIBRARY=cpu
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  vectordb:
    build:
      context: .
      dockerfile: dockerfile.vectordb
    container_name: rowan_vectordb
    ports:
      - "${VECTORDB_PORT:-8000}:8000"
    volumes:
      - vectordb_data:/data
    networks:
      - rowan_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build:
      context: .
      dockerfile: dockerfile
    container_name: rowan_app
    depends_on:
      vectordb:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      VECTORDB_HOST: ${VECTORDB_HOST:-vectordb}
      VECTORDB_PORT: ${VECTORDB_PORT:-8000}
      LLM_HOST: ${LLM_HOST:-http://ollama:11434}
      ENVIRONMENT: ${ENVIRONMENT:-dev}
      PYTHONUNBUFFERED: "1"
    ports:
      - "${APP_PORT:-8081}:8081"
    networks:
      - rowan_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  vectordb_data:
    driver: local
  ollama_models:
    driver: local

networks:
  rowan_network:
    driver: bridge